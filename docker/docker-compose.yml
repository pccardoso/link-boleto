version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql_local
    restart: always
    ports:
      - "3325:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: